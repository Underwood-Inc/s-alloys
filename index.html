<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="description" content="Alloys public docs and interactive QA for Minecraft 26.2." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Alloys" />
    <title>Alloys — Docs &amp; QA</title>
    <link rel="icon" href="./icons/icon-64.png" type="image/png" sizes="64x64" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1419;
        --surface: #1a2332;
        --border: #334155;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(ellipse at top, #1e293b 0%, var(--bg) 60%);
        color: var(--text);
        padding: 2rem;
      }
      main {
        max-width: 520px;
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 2rem;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      img.logo {
        width: 96px;
        height: 96px;
        border-radius: 20px;
        margin-bottom: 1rem;
      }
      h1 { margin: 0 0 0.5rem; font-size: 1.75rem; }
      p { color: var(--muted); line-height: 1.6; }
      nav {
        display: grid;
        gap: 0.75rem;
        margin-top: 1.75rem;
      }
      a {
        display: block;
        padding: 0.85rem 1rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        color: var(--text);
        text-decoration: none;
        font-weight: 600;
      }
      a:hover { border-color: var(--accent); color: var(--accent); }
      a.primary { background: #0ea5e9; border-color: #0284c7; color: #0f172a; }
      a.primary:hover { filter: brightness(1.05); color: #0f172a; }
      .hint { font-size: 0.8rem; margin-top: 1.5rem; }
    </style>
  </head>
  <body>
    <main>
      <img class="logo" src="./icons/icon-192.png" width="96" height="96" alt="Alloys icon" />
      <h1>Alloys</h1>
      <p>Minecraft 26.2 datapack — public docs and ad-hoc QA tools. Install the QA checklist as a progressive web app from your browser menu.</p>
      <nav>
        <a class="primary" href="./qa/">Interactive QA checklist</a>
        <a href="./guide/">Player guide</a>
      </nav>
      <p class="hint">Source code is private; this site is the public companion for <strong>Underwood-Inc/s-alloys</strong> on GitHub Pages.</p>
    </main>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      }
    </script>
  </body>
</html>
